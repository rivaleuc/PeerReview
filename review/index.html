<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PeerReview</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-950 text-white min-h-screen p-6"><div class="max-w-2xl mx-auto">
<h1 class="text-2xl font-bold mb-6">🔬 PeerReview</h1>
<div class="bg-gray-900 rounded-xl p-6 mb-4 border border-gray-800 space-y-3">
<h2 class="text-pink-400 font-semibold">Submit Paper</h2>
<input placeholder="Title" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<textarea placeholder="Abstract..." rows="3" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none resize-none"></textarea>
<input placeholder="Paper URL" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<button class="w-full bg-pink-600 hover:bg-pink-700 rounded-lg py-3 font-bold">Submit</button>
</div>
<div class="bg-gray-900 rounded-xl p-6 border border-gray-800 space-y-3">
<h2 class="text-yellow-400 font-semibold">Trigger Review</h2>
<input placeholder="Paper key" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<button class="w-full bg-yellow-600 hover:bg-yellow-700 rounded-lg py-3 font-bold">📝 Review Now</button>
</div>
</div></body></html>
